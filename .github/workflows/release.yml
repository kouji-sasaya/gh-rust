name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "GitHub CLI extension release ${{ github.ref_name }}.
            
            This extension compiles from source when executed, requiring Rust to be installed.
            
            ## Installation
            \`\`\`bash
            gh extension install kouji-sasaya/gh-rust
            \`\`\`
            
            ## Prerequisites
            - Rust (latest stable version)
            - Cargo
            
            Install Rust from: https://rustup.rs/
            
            ## Usage
            \`\`\`bash
            gh rust
            \`\`\`
            
            ## Supported Platforms
            - Any platform where Rust can compile (Linux, macOS, Windows, etc.)"
