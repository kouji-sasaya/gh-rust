name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: amd64
          - os: ubuntu-latest  
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
            arch: amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Build binary
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      
      - name: Prepare binary (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gh-rust dist/gh-rust_${{ matrix.platform }}_${{ matrix.arch }}
      
      - name: Prepare binary (Windows)
        if: matrix.platform == 'windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gh-rust.exe dist/gh-rust_${{ matrix.platform }}_${{ matrix.arch }}.exe
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/gh-rust_${{ matrix.platform }}_${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Copy all binaries
          find artifacts -name "gh-rust_*" -type f -exec cp {} release-assets/ \;
          # Copy the main script
          cp gh-rust release-assets/
          chmod +x release-assets/gh-rust
          ls -la release-assets/
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "GitHub CLI extension release ${{ github.ref_name }} with cross-platform binary support.
            
            ## Installation
            \`\`\`bash
            gh extension install kouji-sasaya/gh-rust
            \`\`\`
            
            ## Usage
            \`\`\`bash
            gh rust
            \`\`\`
            
            ## Supported Platforms
            - Linux (x86_64, ARM64)
            - macOS (Intel, Apple Silicon)  
            - Windows (x86_64)" \
            release-assets/*
