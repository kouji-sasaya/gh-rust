services:
  gh-rust:
    image: gh-rust
    build:
      context: .
      network: host
      dockerfile: Dockerfile
    working_dir: /workdir
    volumes:
      - .:/workdir
      - gh-rust-cargo:/workdir/.cargo
      - ~/.gitconfig:/home/$(id -un)/.gitconfig
    tty: true
    stdin_open: true
    environment:
      - CARGO_HOME=/workdir/.cargo

volumes:
  gh-rust-cargo:
